{% if artists %}
<figure>
    <table>
        <tbody>
            {% for artist in artists %}
            {% include "partials/artist_row.html" %}
            {% endfor %}
        </tbody>
    </table>
</figure>
<p>
    <small>
        <a href="#"
           hx-get="/partials/artist-search-modal?q={{ query | urlencode }}&event_id={{ event_id or '' }}"
           hx-target="#modal-container"
           hx-swap="innerHTML"
           class="secondary">Search external services&hellip;</a>
    </small>
</p>
{% elif artists is defined and query and query|length >= 3 %}
<p><small>No local artists found.</small></p>
<div id="external-search-results"
     hx-get="/partials/artist-search-external?q={{ query | urlencode }}&event_id={{ event_id or '' }}"
     hx-trigger="load delay:2s"
     hx-swap="innerHTML">
    <p aria-busy="true"><small>Searching externally...</small></p>
</div>
{% elif artists is defined %}
<p>
    <small>No artists found.</small><br>
    <small>
        <a href="#"
           hx-get="/partials/artist-search-modal?q={{ query | urlencode }}&event_id={{ event_id or '' }}"
           hx-target="#modal-container"
           hx-swap="innerHTML"
           class="secondary">Search external services&hellip;</a>
    </small>
</p>
{% endif %}
