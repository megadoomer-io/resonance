{% if tracks %}
<figure>
    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Artist</th>
                <th>Services</th>
            </tr>
        </thead>
        <tbody>
            {% for track in tracks %}
            <tr>
                <td>{{ track.title }}</td>
                <td>{{ track.artist.name }}</td>
                <td>
                    {% if track.service_links %}
                    {{ track.service_links.keys() | join(', ') }}
                    {% else %}
                    --
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</figure>
<nav>
    {% if has_prev %}
    <a href="/tracks?page={{ page - 1 }}"
       hx-get="/tracks?page={{ page - 1 }}"
       hx-target="#track-list"
       hx-swap="innerHTML"
       role="button"
       class="secondary">Previous</a>
    {% endif %}
    {% if has_next %}
    <a href="/tracks?page={{ page + 1 }}"
       hx-get="/tracks?page={{ page + 1 }}"
       hx-target="#track-list"
       hx-swap="innerHTML"
       role="button">Next</a>
    {% endif %}
</nav>
{% else %}
<p>No tracks synced yet.</p>
{% endif %}
