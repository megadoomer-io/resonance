<dialog id="external-search-modal">
    <article>
        <header>
            <button aria-label="Close" rel="prev" onclick="document.getElementById('external-search-modal').close()"></button>
            <h3>Search External Services</h3>
        </header>

        <div style="display: flex; gap: 0.5em; margin-bottom: 1em;">
            <input type="search"
                   id="external-search-input"
                   name="q"
                   placeholder="Search by name or paste a URL..."
                   value="{{ query }}"
                   style="flex: 1;"
                   autocomplete="off">
            <button id="external-search-btn"
                    onclick="doExternalSearch()"
                    style="width: auto;">Search</button>
        </div>

        <div style="margin-bottom: 1em;">
            <small class="secondary">Search in:</small>
            <label style="display: inline; margin-left: 0.5em;">
                <input type="checkbox" id="svc-musicbrainz" checked disabled>
                MusicBrainz
            </label>
            {% for svc in connected_services %}
            <label style="display: inline; margin-left: 0.5em;">
                <input type="checkbox" id="svc-{{ svc }}" class="svc-checkbox" value="{{ svc }}">
                {{ svc | capitalize }}
            </label>
            {% endfor %}
        </div>

        <div id="modal-search-results"></div>
    </article>
</dialog>

<script>
function openExternalSearchModal(prefillQuery) {
    var modal = document.getElementById('external-search-modal');
    var input = document.getElementById('external-search-input');
    if (prefillQuery) input.value = prefillQuery;
    modal.showModal();
    input.focus();
    input.select();
}

document.getElementById('external-search-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        doExternalSearch();
    }
});

function doExternalSearch() {
    var q = document.getElementById('external-search-input').value.trim();
    if (!q) return;
    var services = ['musicbrainz'];
    document.querySelectorAll('.svc-checkbox:checked').forEach(function(cb) {
        services.push(cb.value);
    });
    var eventId = '{{ event_id or "" }}';
    var params = '';

    // Check if input looks like a URL
    if (q.startsWith('http://') || q.startsWith('https://')) {
        params = 'url=' + encodeURIComponent(q);
    } else {
        params = 'q=' + encodeURIComponent(q) + '&services=' + services.join(',');
    }
    if (eventId) params += '&event_id=' + eventId;

    htmx.ajax('GET', '/partials/artist-search-external?' + params, {
        target: '#modal-search-results',
        swap: 'innerHTML'
    });
}

document.body.addEventListener('artist-imported', function() {
    var modal = document.getElementById('external-search-modal');
    if (modal && modal.open) {
        modal.close();
    }
});
</script>
