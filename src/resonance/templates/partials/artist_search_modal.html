<dialog id="external-search-modal"
        data-event-id="{{ event_id or '' }}"
        data-candidate-id="{{ candidate_id or '' }}">
    <article>
        <header>
            <button aria-label="Close" rel="prev" onclick="document.getElementById('external-search-modal').close()"></button>
            <h3>Search External Services</h3>
        </header>

        <div style="display: flex; gap: 0.5em; margin-bottom: 1em;">
            <input type="search"
                   id="external-search-input"
                   name="q"
                   placeholder="Search by name or paste a URL..."
                   value="{{ query }}"
                   style="flex: 1;"
                   autocomplete="off">
            <button id="external-search-btn"
                    onclick="doExternalSearch()"
                    style="width: auto;">Search</button>
        </div>

        <div style="margin-bottom: 1em;">
            <small class="secondary">Search in:</small>
            <label style="display: inline; margin-left: 0.5em;">
                <input type="checkbox" id="svc-musicbrainz" class="svc-checkbox" value="musicbrainz" checked>
                MusicBrainz
            </label>
            {% for svc in connected_services %}
            <label style="display: inline; margin-left: 0.5em;">
                <input type="checkbox" id="svc-{{ svc }}" class="svc-checkbox" value="{{ svc }}">
                {{ svc | capitalize }}
            </label>
            {% endfor %}
        </div>

        <div id="modal-search-results"></div>
    </article>
</dialog>
