{% if sync_jobs %}
{% if has_active_sync %}
<div hx-get="/partials/sync-status" hx-trigger="every 3s" hx-swap="outerHTML">
{% endif %}
<figure>
    <table>
        <thead>
            <tr>
                <th>Service</th>
                <th>Status</th>
                <th>Progress</th>
                <th>Time</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {% for job in sync_jobs %}
            <tr>
                <td>
                    {% set svc = job.service_connection.service_type.value %}
                    {% set svc_color = svc | service_color %}
                    <i data-lucide="{{ svc | service_icon }}" class="icon-inline"{% if svc_color %} style="color: {{ svc_color }}"{% endif %}></i>
                    {{ svc | service_name }}
                </td>
                <td>
                    {% if job.status.value == 'deferred' %}
                    Deferred{% if job.deferred_until %} until {{ (job.deferred_until | localtime(user_tz)).strftime('%H:%M') }}{% endif %}
                    {% elif job.status.value in ('pending', 'running') %}
                    <span aria-busy="true">{{ job.status.value | capitalize }}</span>
                    {% else %}
                    {{ job.status.value | capitalize }}
                    {% endif %}
                </td>
                <td>
                    {% if job.status.value in ('pending', 'running', 'deferred') %}
                        {% if job.task_type.value == 'concert_archives_import' and job.children %}
                        {# Chunked import: one aggregate bar that fills as chunks finish (order-independent). #}
                        {% set ns = namespace(done=0, events=0) %}
                        {% for child in job.children %}
                            {% if child.status.value == 'completed' %}
                            {% set ns.done = ns.done + 1 %}
                            {% if child.result %}{% set ns.events = ns.events + (child.result.get('events_created') or 0) %}{% endif %}
                            {% endif %}
                        {% endfor %}
                        {% set total = job.children | length %}
                        <progress value="{{ ns.done }}" max="{{ total }}" style="width: 100%;"></progress>
                        <small>{{ ns.done }} / {{ total }} parts imported{% if ns.events %} · {{ ns.events }} events{% endif %}</small>
                        {% elif job.children %}
                        {% for child in job.children | sort(attribute='created_at') %}
                            {% if child.status.value == 'completed' %}
                            <div style="margin-bottom: 0.25rem;">
                                <small>✓ {{ child.description or 'Done' }}</small>
                            </div>
                            {% elif child.status.value == 'deferred' %}
                            <div style="margin-bottom: 0.25rem;">
                                <small>{{ child.description or 'Deferred' }} — waiting{% if child.deferred_until %} until {{ (child.deferred_until | localtime(user_tz)).strftime('%H:%M') }}{% endif %}</small>
                            </div>
                            {% elif child.status.value in ('pending', 'running') %}
                            <div style="margin-bottom: 0.25rem;">
                                <small><strong>{{ child.description or 'Processing...' }}</strong></small>
                                {% if child.progress_total %}
                                <progress value="{{ child.progress_current }}" max="{{ child.progress_total }}" style="width: 100%;"></progress>
                                <small>{{ child.progress_current }} / {{ child.progress_total }}
                                {% if child.started_at and child.progress_current > 0 %}
                                    {% set elapsed = (now - child.started_at).total_seconds() %}
                                    {% set rate = child.progress_current / elapsed if elapsed > 0 else 0 %}
                                    {% set remaining = ((child.progress_total - child.progress_current) / rate) if rate > 0 else 0 %}
                                    {% if remaining > 60 %}
                                    (~{{ (remaining / 60) | int }}m remaining)
                                    {% elif remaining > 5 %}
                                    (~{{ remaining | int }}s remaining)
                                    {% endif %}
                                {% endif %}
                                </small>
                                {% elif child.progress_current > 0 %}
                                <progress style="width: 100%;"></progress>
                                <small>{{ child.progress_current }} so far</small>
                                {% else %}
                                <small>Queued</small>
                                {% endif %}
                            </div>
                            {% endif %}
                        {% endfor %}
                        {% else %}
                        <small>{{ job.description or 'Processing...' }}</small>
                        {% endif %}
                    {% elif job.status.value == 'completed' %}
                        {% if job.result %}
                        {% for key, value in job.result.items() if key not in ('watermark', 'last_listened_at', 'backfill_complete', 'children_completed', 'children_failed') %}
                        {% if not loop.first %} / {% endif %}{{ value }} {{ key | replace('_', ' ') }}
                        {% endfor %}
                        {% else %}
                        Done
                        {% endif %}
                    {% elif job.status.value == 'failed' %}
                        {% if job.error_message %}
                        <small>{{ job.error_message[:80] }}</small>
                        {% else %}
                        Failed
                        {% endif %}
                    {% else %}
                    --
                    {% endif %}
                </td>
                <td>
                    {% if job.completed_at %}
                    {{ (job.completed_at | localtime(user_tz)).strftime('%H:%M:%S') }}
                    {% elif job.started_at %}
                    Started {{ (job.started_at | localtime(user_tz)).strftime('%H:%M:%S') }}
                    {% else %}
                    {{ (job.created_at | localtime(user_tz)).strftime('%H:%M') }}
                    {% endif %}
                </td>
                <td>
                    {% if job.status.value in ('pending', 'running', 'deferred') %}
                    <button
                        hx-post="/api/v1/sync/cancel/{{ job.id }}"
                        hx-target="#sync-status"
                        hx-swap="innerHTML"
                        hx-confirm="Cancel this sync job?"
                        class="outline secondary btn-sm"
                    >Cancel</button>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</figure>
{% if has_active_sync %}
</div>
{% endif %}
{% else %}
<p>No sync jobs yet. Connect a service and click <strong>Sync Now</strong> to get started.</p>
{% endif %}
