{% from "partials/service_badges.html" import service_badge_headers, service_badge_cells %}
{% if artists %}
<figure>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                {{ service_badge_headers() }}
            </tr>
        </thead>
        <tbody>
            {% for artist in artists %}
            <tr>
                <td><a href="/artists/{{ artist.id }}">{{ artist.name }}</a></td>
                {{ service_badge_cells(artist.service_links, entity_type="artist", entity_name=artist.name) }}
            </tr>
            {% endfor %}
        </tbody>
    </table>
</figure>
<nav>
    {% if has_prev %}
    <a href="/artists?page={{ page - 1 }}{% if filter_qs %}&{{ filter_qs }}{% endif %}"
       hx-get="/artists?page={{ page - 1 }}{% if filter_qs %}&{{ filter_qs }}{% endif %}"
       hx-target="#artist-list"
       hx-swap="innerHTML"
       role="button"
       class="secondary">Previous</a>
    {% endif %}
    {% if has_next %}
    <a href="/artists?page={{ page + 1 }}{% if filter_qs %}&{{ filter_qs }}{% endif %}"
       hx-get="/artists?page={{ page + 1 }}{% if filter_qs %}&{{ filter_qs }}{% endif %}"
       hx-target="#artist-list"
       hx-swap="innerHTML"
       role="button">Next</a>
    {% endif %}
</nav>
{% else %}
<p>No artists synced yet.</p>
{% endif %}
