{% if artists %}
<figure>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Services</th>
            </tr>
        </thead>
        <tbody>
            {% for artist in artists %}
            <tr>
                <td>{{ artist.name }}</td>
                <td>
                    {% if artist.service_links %}
                    {{ artist.service_links.keys() | join(', ') }}
                    {% else %}
                    --
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</figure>
<nav>
    {% if has_prev %}
    <a href="/artists?page={{ page - 1 }}"
       hx-get="/artists?page={{ page - 1 }}"
       hx-target="#artist-list"
       hx-swap="innerHTML"
       role="button"
       class="secondary">Previous</a>
    {% endif %}
    {% if has_next %}
    <a href="/artists?page={{ page + 1 }}"
       hx-get="/artists?page={{ page + 1 }}"
       hx-target="#artist-list"
       hx-swap="innerHTML"
       role="button">Next</a>
    {% endif %}
</nav>
{% else %}
<p>No artists synced yet.</p>
{% endif %}
