{% if state == "button" %}
<button
    hx-get="/partials/concert-archives-upload"
    hx-target="#concert-archives-connect"
    hx-swap="innerHTML"
    class="outline"
><i data-lucide="archive" class="icon-inline"></i> Connect Concert Archives</button>

{% elif state == "form" %}
<form
    hx-post="/api/v1/connections/concert-archives/upload"
    hx-swap="none"
    hx-encoding="multipart/form-data"
    hx-on::after-request="
      if(event.detail.successful) { location.reload(); }
      else {
        var msg = 'Upload failed.';
        try { msg = JSON.parse(event.detail.xhr.responseText).detail; } catch(e) {}
        var el = document.getElementById('ca-upload-error');
        if(el) { el.querySelector('mark').textContent = msg; el.style.display = 'block'; }
      }
    "
>
    <label>
        CSV Export File
        <input type="file" name="file" accept=".csv" required id="ca-file-input">
    </label>
    <fieldset>
        <label>
            <input type="checkbox" id="ca-use-today" checked
                   onchange="document.getElementById('ca-export-date').disabled = this.checked">
            Use today's date as export date
        </label>
        <input type="date" name="export_date" id="ca-export-date" disabled>
    </fieldset>
    <script>
    document.getElementById('ca-file-input').addEventListener('change', function() {
        var name = this.files && this.files[0] && this.files[0].name;
        if (!name) return;
        var m = name.match(/(\d{2})-(\d{2})-(\d{4})/);
        if (m) {
            var dateStr = m[3] + '-' + m[1] + '-' + m[2];
            var dateInput = document.getElementById('ca-export-date');
            var checkbox = document.getElementById('ca-use-today');
            checkbox.checked = false;
            dateInput.disabled = false;
            dateInput.value = dateStr;
        }
    });
    </script>
    <p id="ca-upload-error" style="display:none"><mark></mark></p>
    <div class="grid">
        <button type="submit"><i data-lucide="upload" class="icon-inline"></i> Upload</button>
        <button
            hx-get="/partials/concert-archives-connect"
            hx-target="#concert-archives-connect"
            hx-swap="innerHTML"
            class="secondary outline"
            type="button"
        >Cancel</button>
    </div>
</form>

{% elif state == "error" %}
<p><mark>{{ error_message | default("Failed to upload Concert Archives CSV.") }}</mark></p>
<button
    hx-get="/partials/concert-archives-upload"
    hx-target="#concert-archives-connect"
    hx-swap="innerHTML"
    class="outline"
>Try Again</button>
{% endif %}
