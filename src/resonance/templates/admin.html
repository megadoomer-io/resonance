{% extends "base.html" %}

{% block title %}Admin — resonance{% endblock %}

{% block content %}
<h1>Admin</h1>

<div class="grid">
    <article>
        <header>Users</header>
        <p><strong>{{ user_count }}</strong></p>
    </article>
</div>

<h2>Users</h2>
<figure>
    <table>
        <thead>
            <tr>
                <th>Display Name</th>
                <th>Role</th>
                <th>Member Since</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for u in users %}
            <tr>
                <td>{{ u.display_name }}</td>
                <td>{{ u.role.value | capitalize }}</td>
                <td>{{ (u.created_at | localtime(user_tz)).strftime('%Y-%m-%d') }}</td>
                <td>
                    {% if u.id | string != user_id %}
                    <form method="post" action="/admin/users/{{ u.id }}/role" style="display:inline">
                        <select name="role" onchange="this.form.submit()">
                            <option value="user" {% if u.role.value == 'user' %}selected{% endif %}>User</option>
                            <option value="admin" {% if u.role.value == 'admin' %}selected{% endif %}>Admin</option>
                            {% if user_role == 'owner' %}
                            <option value="owner" {% if u.role.value == 'owner' %}selected{% endif %}>Owner</option>
                            {% endif %}
                        </select>
                    </form>
                    {% else %}
                    <small>(you)</small>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</figure>

<h2>Recent Sync Tasks</h2>
<figure>
    <table>
        <thead>
            <tr>
                <th>User</th>
                <th>Service</th>
                <th>Type</th>
                <th>Status</th>
                <th>Progress</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for task in tasks %}
            <tr>
                <td>{{ task.service_connection.user.display_name if task.service_connection else '?' }}</td>
                <td>{{ task.service_connection.service_type.value | capitalize if task.service_connection else '?' }}</td>
                <td>{{ task.task_type.value | replace('_', ' ') | capitalize }}</td>
                <td>{{ task.status.value | capitalize }}</td>
                <td>{{ task.progress_current }}/{{ task.progress_total or '?' }}</td>
                <td>{{ (task.created_at | localtime(user_tz)).strftime('%Y-%m-%d %H:%M') }}</td>
                <td>
                    <form method="post" action="/admin/tasks/{{ task.id }}/clone" style="display:inline">
                        <button type="submit" class="outline secondary" style="padding:0.25rem 0.5rem;font-size:0.8rem">Clone</button>
                    </form>
                    <form method="post" action="/admin/tasks/{{ task.id }}/clone" style="display:inline">
                        <input type="hidden" name="step_mode" value="true">
                        <button type="submit" class="outline" style="padding:0.25rem 0.5rem;font-size:0.8rem">Step</button>
                    </form>
                    {% if task.params and task.params.get('step_mode') and task.status.value in ('running', 'deferred') %}
                    <form method="post" action="/admin/tasks/{{ task.id }}/resume" style="display:inline">
                        <button type="submit" style="padding:0.25rem 0.5rem;font-size:0.8rem">Next Step</button>
                    </form>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</figure>

<h2>Maintenance</h2>
<div id="dedup-result"></div>
<p>
<button
    hx-post="/admin/dedup-events"
    hx-target="#dedup-result"
    hx-swap="innerHTML"
    hx-confirm="Remove duplicate cross-service listening events?"
    class="outline"
>Dedup Listening Events</button>
<button
    hx-post="/admin/dedup-artists"
    hx-target="#dedup-result"
    hx-swap="innerHTML"
    hx-confirm="Merge duplicate artist records? This cannot be undone."
    class="outline"
>Dedup Artists</button>
<button
    hx-post="/admin/dedup-tracks"
    hx-target="#dedup-result"
    hx-swap="innerHTML"
    hx-confirm="Merge duplicate track records? This cannot be undone."
    class="outline"
>Dedup Tracks</button>
</p>
{% endblock %}
