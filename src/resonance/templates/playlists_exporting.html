{% extends "base.html" %}
{% block title %}Exporting Playlist — resonance{% endblock %}
{% block content %}
<h2>{{ playlist_name }}</h2>

<div id="export-status"
     hx-get="/partials/export-status/{{ playlist_id }}?task_ids={{ task_ids }}"
     hx-trigger="every 3s"
     hx-swap="outerHTML">
    <article aria-busy="true">
        Exporting to Spotify...
    </article>
</div>
{% endblock %}
